name: Build, lint and test

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-lint:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install clang-format
        run: brew install clang-format

      - name: Check code format
        run: |
          find . -path ./build -prune -o -type f \( -name "*.c" -o -name "*.h" \) -print | xargs clang-format --style=file --dry-run -Werror

      - name: Configure CMake
        run: cmake -B build -S .

      - name: Build project
        run: cmake --build build

      - name: Run tests
        run: chmod +x run_tests.sh && ./run_tests.sh

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-outputs
          path: Tests/*.out

      - name: Commit and push test results
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add -f Tests/*.out
          git diff --quiet && git diff --staged --quiet || git commit -m "Update test outputs [skip ci]"
          git push